name: "Deploy To Google Play Store"

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Reconstruct google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Decode Local Properties
        run: |
          echo "${{ secrets.LOCAL_PROPERTIES_BASE64 }}" | base64 --decode > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew clean testDebugUnitTest

  distribute:
    name: Distribute bundle to Google Play
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Reconstruct google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Decode Local Properties
        run: |
          echo "${{ secrets.LOCAL_PROPERTIES_BASE64 }}" | base64 --decode > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Version bump
        uses: chkfung/android-version-actions@v1.2.3
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{ github.run_number }}

      - name: Assemble Release Bundle
        run: ./gradlew bundleRelease

      - name: Sign Release Bundle
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.COWORK_KEYSTORE }}
          keystorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          alias: ${{ secrets.COWORK_ALIAS }}
          keyPassword: ${{ secrets.ALIAS_KEY_PASSWORD }}

      - name: Setup Authorization with Google Play Store
        run: |
          echo "${{ secrets.PLAY_AUTH_JSON }}" > service_account.json

      - name: Deploy Bundle To Google Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: service_account.json
          packageName: com.alvinfungai.cowork
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: "completed"
          whatsNewDirectory: whatsNew/